<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Core | Terminal de Servicios</title>
    <style>
        :root {
            --nexus-blue: #00e5ff; /* Azul cian eléctrico */
            --nexus-white: #ffffff;
            --bg-dark: #050505;
            --terminal-dark: #0a0a0a;
        }

        body { 
            background-color: var(--bg-dark); 
            color: var(--nexus-white); 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
            background-image: radial-gradient(circle at center, #001a1d 0%, #050505 100%);
        }

        .container { 
            background: rgba(10, 10, 10, 0.98); 
            border: 1px solid var(--nexus-blue); 
            padding: 30px; 
            border-radius: 4px; 
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.15); 
            width: 100%; 
            max-width: 500px;
            position: relative;
        }

        /* Líneas de escaneo sutiles */
        .container::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15), rgba(0,0,0,0.15) 1px, transparent 1px, transparent 2px);
            pointer-events: none;
            opacity: 0.5;
        }

        h1 { 
            color: var(--nexus-blue); 
            font-size: 1.8rem; 
            text-align: center; 
            margin-bottom: 25px; 
            text-transform: uppercase; 
            letter-spacing: 6px;
            text-shadow: 0 0 15px var(--nexus-blue);
        }

        .section-title { 
            color: var(--nexus-blue); 
            font-size: 0.8rem; 
            margin-top: 25px; 
            border-left: 2px solid var(--nexus-blue);
            padding-left: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            background: rgba(0, 229, 255, 0.05);
        }

        .option { 
            display: flex; 
            align-items: flex-start; 
            justify-content: space-between; 
            margin: 12px 0; 
            padding: 12px; 
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid #1a1a1a;
            transition: 0.3s;
        }

        .option:hover { 
            border-color: var(--nexus-blue);
            background: rgba(0, 229, 255, 0.05);
            box-shadow: inset 0 0 10px rgba(0, 229, 255, 0.05);
        }

        label { cursor: pointer; display: flex; flex-direction: column; flex: 1; font-size: 0.85rem; }
        .desc { font-size: 0.7rem; color: #666; margin-top: 5px; line-height: 1.3; }
        
        input[type="checkbox"] { 
            margin-right: 15px;
            accent-color: var(--nexus-blue);
            transform: scale(1.3);
            margin-top: 4px;
        }

        .price-tag { color: var(--nexus-blue); font-weight: bold; font-size: 0.9rem; min-width: 90px; text-align: right; }

        .total-box { 
            margin-top: 30px; 
            padding: 20px; 
            border: 1px solid var(--nexus-blue);
            text-align: center;
            background: rgba(0, 229, 255, 0.02);
            position: relative;
        }

        #total-display { font-size: 2.2rem; color: var(--nexus-white); text-shadow: 0 0 15px var(--nexus-blue); font-weight: bold; }

        .btn-send { 
            width: 100%; 
            background: transparent; 
            color: var(--nexus-blue); 
            border: 1px solid var(--nexus-blue); 
            padding: 15px; 
            font-weight: bold; 
            margin-top: 25px; 
            cursor: pointer; 
            text-transform: uppercase;
            font-family: 'Courier New', monospace;
            letter-spacing: 3px;
            transition: 0.3s;
        }

        .btn-send:hover { 
            background: var(--nexus-blue); 
            color: #000; 
            box-shadow: 0 0 25px var(--nexus-blue); 
        }

        input[type="text"] { 
            width: 100%; 
            padding: 12px; 
            background: #000; 
            border: 1px solid #222; 
            color: #fff; 
            font-family: 'Courier New', monospace;
            box-sizing: border-box; 
            margin-top: 20px;
            outline: none;
        }

        input[type="text"]:focus { border-color: var(--nexus-blue); }
    </style>
</head>
<body>

<div class="container">
    <h1>NEXUS_CORE // SYSTEM</h1>
    <form id="form-cotizador">
        
        <div class="section-title">01. DESARROLLO_WEB</div>
        <div class="option">
            <input type="checkbox" name="servicios" value="Web_Basica" data-price="600000" class="service">
            <label>WEB_BÁSICA 
                <span class="desc">Landing Page | Secciones: Servicios, Testimonios | 5MB Almacenamiento</span>
            </label>
            <span class="price-tag">$600K</span>
        </div>
        <div class="option">
            <input type="checkbox" name="servicios" value="Web_Empresarial" data-price="1500000" class="service">
            <label>WEB_EMPRESARIAL 
                <span class="desc">20 Redirecciones | Animaciones PRO | Contacto | 15MB Storage</span>
            </label>
            <span class="price-tag">$1.5M</span>
        </div>

        <div class="section-title">02. GESTIÓN_MENSUAL</div>
        <div class="option">
            <input type="checkbox" name="servicios" value="Plan_Alpha" data-price="600000" class="service">
            <label>PLAN_ALPHA <span class="desc">10 Videos | 20 Imágenes</span></label>
            <span class="price-tag">$600K</span>
        </div>
        <div class="option">
            <input type="checkbox" name="servicios" value="Plan_Beta" data-price="650000" class="service">
            <label>PLAN_BETA <span class="desc">15 Videos | 15 Imágenes</span></label>
            <span class="price-tag">$650K</span>
        </div>
        <div class="option">
            <input type="checkbox" name="servicios" value="Plan_Gamma" data-price="700000" class="service">
            <label>PLAN_GAMMA <span class="desc">20 Videos | 10 Imágenes</span></label>
            <span class="price-tag">$700K</span>
        </div>

        <div class="section-title">03. MULTIMEDIA_SOLO</div>
        <div class="option">
            <input type="checkbox" name="servicios" value="Edit_Imagen" data-price="15000" class="service">
            <label>EDICIÓN_IMAGEN</label>
            <span class="price-tag">$15.000</span>
        </div>
        <div class="option">
            <input type="checkbox" name="servicios" value="Edit_Video" data-price="30000" class="service">
            <label>EDICIÓN_VIDEO (15-30s)</label>
            <span class="price-tag">$30.000</span>
        </div>

        <div class="total-box">
            <span style="font-size: 0.6rem; letter-spacing: 3px; opacity: 0.5;">PROJECT_INVOICE_TOTAL:</span><br>
            <span id="total-display">$0</span>
        </div>

        <input type="hidden" name="total_calculado" id="input-total">
        <input type="text" name="cliente" placeholder="ID_CLIENTE_ENTIDAD" required>
        <button type="submit" id="submit-btn" class="btn-send">EJECUTAR_SOLICITUD</button>
    </form>
</div>

<script>
    const checkboxes = document.querySelectorAll('.service');
    const display = document.getElementById('total-display');
    const inputTotal = document.getElementById('input-total');
    const form = document.getElementById('form-cotizador');
    const submitBtn = document.getElementById('submit-btn');

    checkboxes.forEach(item => {
        item.addEventListener('change', () => {
            let total = 0;
            checkboxes.forEach(c => {
                if(c.checked) total += parseInt(c.getAttribute('data-price'));
            });
            display.innerText = '$' + total.toLocaleString('es-CO');
            inputTotal.value = '$' + total.toLocaleString('es-CO');
        });
    });

    form.addEventListener("submit", e => {
        e.preventDefault();
        submitBtn.innerText = "LINKING_TO_DATABASE...";
        
        fetch("https://sheetdb.io/api/v1/wui6tspo2lgsy", {
            method : "POST",
            body: new FormData(document.getElementById("form-cotizador")),
        }).then(res => res.json()).then(() => {
            submitBtn.innerText = "ACCESS_GRANTED_DATA_SYNCED";
            form.reset();
            display.innerText = "$0";
            setTimeout(() => { submitBtn.innerText = "EJECUTAR_SOLICITUD"; }, 3000);
        });
    });
</script>
</body>
</html>
