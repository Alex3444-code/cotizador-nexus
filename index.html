<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Core | Cotizador Profesional</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --nexus-blue: #0084ff; /* Azul sutil y profesional de tu web */
            --bg-dark: #000000;
            --container-bg: #111111; /* Gris oscuro para las tarjetas */
            --text-white: #ffffff;
            --text-gray: #aaaaaa;
            --border-gray: #333333;
        }

        body { 
            background-color: var(--bg-dark); 
            color: var(--text-white); 
            font-family: 'Inter', sans-serif; /* Tipografía limpia */
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
            padding: 20px;
        }

        .container { 
            background: var(--container-bg); 
            border: 1px solid var(--border-gray); 
            padding: 40px; 
            border-radius: 8px; /* Esquinas ligeramente redondeadas */
            width: 100%; 
            max-width: 520px;
        }

        h1 { 
            color: var(--text-white); 
            font-size: 1.8rem; 
            text-align: center; 
            margin-bottom: 5px; 
            font-weight: 700;
            letter-spacing: -1px;
        }
        
        .subtitle {
            color: var(--text-gray);
            text-align: center;
            font-size: 0.9rem;
            margin-bottom: 30px;
            font-weight: 300;
        }

        .section-title { 
            color: var(--text-white); 
            font-size: 0.8rem; 
            margin-top: 30px; 
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            opacity: 0.5;
        }

        .option { 
            display: flex; 
            align-items: flex-start; 
            justify-content: space-between; 
            margin: 15px 0; 
            padding: 15px; 
            background: #181818; /* Fondo más oscuro para las opciones */
            border: 1px solid transparent;
            border-radius: 6px;
            transition: 0.2s;
        }

        .option:hover { 
            border-color: #444;
        }

        label { cursor: pointer; display: flex; flex-direction: column; flex: 1; font-size: 0.9rem; font-weight: 400; color: var(--text-white); }
        .desc { font-size: 0.8rem; color: var(--text-gray); margin-top: 5px; line-height: 1.4; font-weight: 300; }
        
        input[type="checkbox"] { 
            margin-right: 18px;
            accent-color: var(--nexus-blue); /* Checkbox azul */
            transform: scale(1.4);
            margin-top: 3px;
        }

        .price-tag { color: var(--nexus-blue); font-weight: 600; font-size: 1rem; min-width: 90px; text-align: right; }

        .total-box { 
            margin-top: 40px; 
            padding: 20px; 
            background: #181818;
            border-radius: 6px;
            text-align: center;
            border: 1px solid var(--border-gray);
        }

        .total-label { font-size: 0.8rem; color: var(--text-gray); text-transform: uppercase; letter-spacing: 2px; }
        #total-display { font-size: 2.8rem; color: var(--text-white); font-weight: 700; margin-top: 5px; display: block; }

        .btn-send { 
            width: 100%; 
            background: var(--nexus-blue); /* Botón sólido azul */
            color: var(--text-white); 
            border: none; 
            padding: 18px; 
            font-weight: 600; 
            margin-top: 30px; 
            cursor: pointer; 
            border-radius: 6px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: 0.2s;
        }

        .btn-send:hover { 
            background: #0077e6; /* Azul ligeramente más oscuro al pasar el mouse */
        }

        input[type="text"] { 
            width: 100%; 
            padding: 15px; 
            background: #181818; 
            border: 1px solid var(--border-gray); 
            color: var(--text-white); 
            font-family: 'Inter', sans-serif;
            box-sizing: border-box; 
            margin-top: 20px;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        input[type="text"]:focus { border-color: var(--nexus-blue); outline: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Nexus Core</h1>
    <p class="subtitle">Herramienta de Cotización de Servicios</p>
    
    <form id="form-cotizador">
        
        <div class="section-title">01. Desarrollo Web</div>
        <div class="option">
            <input type="checkbox" name="servicios" value="Web_Basica" data-price="600000" class="service">
            <label>Landing Page (Básica) 
                <span class="desc">Secciones de servicios y testimonios | Transiciones base | 5MB Almacenamiento</span>
            </label>
            <span class="price-tag">$600K</span>
        </div>
        <div class="option">
            <input type="checkbox" name="servicios" value="Web_Empresarial" data-price="1500000" class="service">
            <label>Web Empresarial 
                <span class="desc">20 Redirecciones | Animaciones avanzadas | Formulario de contacto | 15MB Storage</span>
            </label>
            <span class="price-tag">$1.5M</span>
        </div>

        <div class="section-title">02. Gestión Redes Sociales (Mensual)</div>
        <div class="option">
            <input type="checkbox" name="servicios" value="Plan_Alpha" data-price="600000" class="service">
            <label>Plan Alpha <span class="desc">Incluye: 10 Videos + 20 Fotos mensuales</span></label>
            <span class="price-tag">$600K</span>
        </div>
        <div class="option">
            <input type="checkbox" name="servicios" value="Plan_Beta" data-price="650000" class="service">
            <label>Plan Beta <span class="desc">Incluye: 15 Videos + 15 Fotos mensuales</span></label>
            <span class="price-tag">$650K</span>
        </div>
        <div class="option">
            <input type="checkbox" name="servicios" value="Plan_Gamma" data-price="700000" class="service">
            <label>Plan Gamma <span class="desc">Incluye: 20 Videos + 10 Fotos mensuales</span></label>
            <span class="price-tag">$700K</span>
        </div>

        <div class="section-title">03. Edición Individual</div>
        <div class="option">
            <input type="checkbox" name="servicios" value="Edit_Imagen" data-price="15000" class="service">
            <label>Edición Imagen <span class="desc">Retoque profesional y diseño gráfico</span></label>
            <span class="price-tag">$15.000</span>
        </div>
        <div class="option">
            <input type="checkbox" name="servicios" value="Edit_Video" data-price="30000" class="service">
            <label>Edición Video <span class="desc">Corte de 15 a 30 seg (Reels / TikTok)</span></label>
            <span class="price-tag">$30.000</span>
        </div>

        <div class="total-box">
            <span class="total-label">Inversión Total Estimada:</span>
            <span id="total-display">$0</span>
        </div>

        <input type="hidden" name="total_calculado" id="input-total">
        <input type="text" name="cliente" placeholder="Nombre de tu empresa o proyecto" required>
        <button type="submit" id="submit-btn" class="btn-send">Enviar Cotización</button>
    </form>
</div>

<script>
    const checkboxes = document.querySelectorAll('.service');
    const display = document.getElementById('total-display');
    const inputTotal = document.getElementById('input-total');
    const form = document.getElementById('form-cotizador');
    const submitBtn = document.getElementById('submit-btn');

    checkboxes.forEach(item => {
        item.addEventListener('change', () => {
            let total = 0;
            checkboxes.forEach(c => {
                if(c.checked) total += parseInt(c.getAttribute('data-price'));
            });
            display.innerText = '$' + total.toLocaleString('es-CO');
            inputTotal.value = '$' + total.toLocaleString('es-CO');
        });
    });

    form.addEventListener("submit", e => {
        e.preventDefault();
        submitBtn.disabled = true;
        submitBtn.innerText = "Enviando datos...";
        
        fetch("https://sheetdb.io/api/v1/wui6tspo2lgsy", {
            method : "POST",
            body: new FormData(document.getElementById("form-cotizador")),
        }).then(res => res.json()).then(() => {
            submitBtn.innerText = "¡Enviado con Éxito!";
            submitBtn.style.background = "#28a745"; // Color verde de éxito
            form.reset();
            display.innerText = "$0";
            setTimeout(() => { 
                submitBtn.disabled = false;
                submitBtn.innerText = "Enviar Cotización"; 
                submitBtn.style.background = "#0084ff"; // Volver al azul original
            }, 4000);
        }).catch(() => {
            submitBtn.innerText = "Error de red";
            submitBtn.style.background = "#dc3545"; // Color rojo de error
            setTimeout(() => { 
                submitBtn.disabled = false;
                submitBtn.innerText = "Enviar Cotización"; 
                submitBtn.style.background = "#0084ff";
            }, 4000);
        });
    });
</script>
</body>
</html>
